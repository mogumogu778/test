name: Daily Stock Data Batch

on:
  schedule:
    - cron: '30 6 * * 1-5'   # JST 15:30（東証閉場後）
    - cron: '30 21 * * 1-5'  # JST 翌6:30（NYSE閉場後）
  workflow_dispatch:           # 手動実行も可能

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: batch/requirements.txt

      - name: Install dependencies
        run: pip install -r batch/requirements.txt

      - name: Run batch
        run: python batch/fetch_all.py

      - name: Commit and push data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add public/data/
          git diff --cached --quiet || git commit -m "chore: daily data update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
